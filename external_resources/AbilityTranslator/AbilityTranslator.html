				var processSoulbreak = function(soulbreak, abilities) {

				var parseAbility = function(ability, abilities, parsedAbilities) {
					var results = "";
					var action = { elements: [], modifiers: [], subAbilities: [], subActions: [] };
					var options = ability.options;
					
					parsedAbilities.push(action);
					
					action.name = (options.name ? unescape(options.name) : "Attack");
					action.abilityId = ability.ability_id;
					action.exerciseType = exerciseTypes[ability.exercise_type];
					action.targetRange = TargetRange[options.target_range];
					action.targetMethod = targetMethod[options.target_method];
					action.targetSegment = targetSegment[options.target_segment];
					action.castTime = Number(options.cast_time / 1000).toFixed(2);
					action.class = abilityCategories[ability.category_id];
					action.sbCharge = Number(options.ss_point);
					action.counterable = Number(options.counter_enable) == 0 ? false : true;

					results += "<div>";
					results += "Name: " + action.name + "<br />";
					results += "Ability ID: " + action.abilityId + "<br />";
					results += "Action Type: " + action.exerciseType + "<br />";
					results += (action.class != null ? ("Ability Class: " + action.class + "<br />") : "");
					results += "Cast Time: " + action.castTime + "<br />"
					results += (action.sbCharge > 0 ? ("SB Charge: " + action.sbCharge + "<br />") : "");
					results += "Target: " + getTargetById(options.target_range, options.target_method, options.target_segment, options.active_target_method) + "<br />";
					results += "Counterable: " + action.counterable + "<br />";
					
					if (FF.ns.battle.Config.getInstance().get("ExceptionalFlightAttackIds").indexOf(Number(action.abilityId)) != -1) {
						action.abilityType = "jump";
						results += "Ability Type: Jump <br />";
					}
					
					var actionFormula = $.grep(actionMap, function(action, index) {
						return action.action_id == ability.action_id;
					})[0];
					
					action.actionId = ability.action_id
					
					results += "Action ID: " + action.actionId + "<br />";
					results += "Formula Type: ";
					if (actionFormula) {
						results += actionFormula.classname;
					}
					else {
						results += "No mapping for action ID: " + ability.action_id;
					}
					results += "<br />";
					
					if (actionFormula == null) {
						console.log("No formula mapped: " + ability.ability_id + " - " + ability.options.name + " - " + ability.action_id);
						return "";
					}
					
					var formulaAttributes = Object.keys(actionFormula);
					var otherAbilities = "";
					formulaAttributes.forEach(function(key, index) {
						if (key.indexOf("arg") > -1) {
							switch(actionFormula[key]) {
								case "hpFactor":
									if (Number(options[key] > 0)) {
										action.removesKO = Number(options[key]);
										results += "Removes KO: " + action.removesKO + "%<br />";
									}
									break;
								case "factor":
									if (Number(options[key] > 0)) {
										action.healingFactor = Number(options[key]);
										results += "Healing Factor: " + action.healingFactor + "<br />";
									}
									break;
								case "magicalAttackDamageFactor":
									if (Number(options[key]) > 0) {
										action.matkMultiplier = Number(options[key]);
										results += "Magical Multiplier: " + action.matkMultiplier + "<br />";
									}
									break;
								case "physicalAttackDamageFactor":
									if (Number(options[key]) > 0) {
										action.patkMultiplier = Number(options[key]);
										results += "Physical Multiplier: " + action.patkMultiplier + "<br />";
									}
									break;
								case "damageFactor":
									action.multiplier = Number(options[key]) / 100;
									results += "Multiplier: " + action.multiplier + "<br />";
									break;
								case "atkElement":
								case "matkElement":
								case "args (elements)":
									if (Number(options[key]) > 0) {
										action.elements.push(elementTypes[options[key]]);
									}
									break;
								case "atkExponentialFactor":
									if (Number(options[key]) > 0) {
										action.atkExponentialFactor = Number(options[key]);
										results += "Defense Piercing Factor: " + action.atkExponentialFactor + "<br />";
									}
									break;
								case "matkExponentialFactor":
									if (Number(options[key]) > 0) {
										action.matkExponentialFactor = Number(options[key]);
										results += "Resistance Piercing Factor: " + action.matkExponentialFactor + "<br />";
									}
									break;
								case "atkType":
									action.isRanged = Number(options[key]) == 2 ? true : false;
									results += "Range: " + atkTypes[options[key]] + "<br />";
									break;
								case "barrageNum":
									action.hits = Number(options[key])
									results += "Hits: " + action.hits + "<br />";
									break;
								case "criticalRatio":
								case "critical":
									if (Number(options[key]) > 0) {
										action.critialHitPercentage = Number(options[key]);
										results += "Critical Hit %: " + action.critialHitPercentage + "%<br />";
									}
									break;
								case "damageRate":
									if (Number(options[key]) > 0) {
										if (Number(options["useMaxHp"]) == 1) {
											action.maxHPDamage = Number(options[key]);
											results += "Max HP Damage: " + action.maxHPDamage + "%<br />";
										}
										else {
											action.currentHPDamage = Number(options[key]);
											results += "Current HP Damage: " + action.currentHPDamage + "%<br />";
										}
									}
									break;

				var setActionModifiers = function(actionFormula, options, attack) {
					var defaultTarget = getTargetById(options.target_range, options.target_method, options.target_segment, options.active_target_method);
					var defaultDuration = false;
					if (options.status_ailments_id > 0) {
						var modifier = {};
						modifier.id = Number(options.status_ailments_id);
						modifier.hitChance = Number(options.status_ailments_factor);
						modifier.target = defaultTarget;
						
						if (modifier.hitChance == FORCE_INFLICT_STATUS_AILMENTS_FACTOR) {
							modifier.isAutoHit = true;
						}
						
						if (modifier.id == 535) {
							if (actionFormula.actionid == 137 || actionFormula.actionid == 151) {
								modifier.value = Number(options["arg8"]) * 10;
								modifier.duration = Number(options["arg9"]) / 1000;
							}
							else if (actionFormula.actionid == 160) {
								modifier.value = Number(options["arg7"]) * 10;
								modifier.duration = Number(options["arg8"]) / 1000;
							}
						}
						else if (modifier.id == 532 || modifier.id == 50189 || modifier.id == 50552) {
							modifier.duration = 15;
							modifier.target = getTargetById(FF.ns.battle.Conf.TARGET_RANGE.SELF, FF.ns.battle.Conf.TARGET_METHOD.NOTHING, FF.ns.battle.Conf.TARGET_SEGMENT.COLLEAGUE, FF.ns.battle.Conf.ACTIVE_TARGET_METHOD.BOTH_ENABLE);
						}
						
						attack.modifiers.push(modifier);
					}
					
					var currentModifier = {};
					var formulaAttributes = Object.keys(actionFormula);
					formulaAttributes.forEach(function(key, index) {
						if (key.indexOf("arg") > -1) {
							switch(actionFormula[key]) {
								case "atkSa":
								case "args":
								case "args (setSa)":
								case "bundleArgs":
								case "bundleArgs (setSa)":
								case "statusId":
								case "makeStatusAilments":
								case "_saAbilityToTargetA":
								case "id":
								case "opponentStatusAilments":
								case "statusAilmentsId":
									if (currentModifier.id != options[key]) {
										if (currentModifier.id != false) {
											if (currentModifier.target == null) {
												currentModifier.target = defaultTarget;
											}
											attack.modifiers.push(currentModifier);
											currentModifier = {};
										}
										
										var statusName = statusConstants[Number(key)];
										if (statusName == false) {
											statusName = statusBundleConstants[Number(key)];
										}
										
										currentModifier.id = options[key];
									}
									break;
								case "atkStatusAilments":
								case "selfStatusAilments":
								case "selfBundleAilments":
								case "selfSaIds":
								case "selfSaId":
								case "optionalSelfSaId":
									if (currentModifier.id != options[key]) {
										if (currentModifier.id != false) {
											if (currentModifier.target == null) {
												currentModifier.target = defaultTarget;
											}
											attack.modifiers.push(currentModifier);
											currentModifier = {};
										}
										currentModifier.id = options[key];
										currentModifier.target = "SELF"
									}
									break;
								case "partyStatusAilments":
									if (currentModifier.id != options[key]) {
										if (currentModifier.id != false) {
											if (currentModifier.target == null) {
												currentModifier.target = defaultTarget;
											}
											attack.modifiers.push(currentModifier);
											currentModifier = {};
										}
										currentModifier.id = options[key];
										currentModifier.target = "ALL"
									}
									break;
								case "rate":
								case "boost":
								case "value":
								case "amount":
									currentModifier.value = options[key];
									break;
								case "defenseFactor":
									if (options.status_ailments_id == 0) {
										currentModifier.value = Number(options[key]) * 10;
									}
									break;
								case "duration":
									var duration = Number(options[key]);
									if (duration > 0) {
										currentModifier.duration = Number(options[key]) / 1000
									}
									break;
								case "duration (statusAilments)":
									defaultDuration = Number(options[key]) / 1000;
									break;
							}
						}
					});
					
					attack.modifiers.push(currentModifier);
					
					var newModifiers = [];
					for (var i = attack.modifiers.length - 1; i >= 0 ; i--) {
						var modifier = attack.modifiers[i];
						if (modifier.target == null) {
							modifier.target = defaultTarget;
						}
						
						if (modifier.duration == null && defaultDuration != false) {
							modifier.duration = defaultDuration;
						}
						
						var statusName = statusConstants[modifier.id];
						if (statusName == false) {
							statusName = statusBundleConstants[modifier.id];
							var bundledStatuses = FF.ns.battle.StatusAilmentsConfig.getBundle(Number(modifier.id));
							if (bundledStatuses != null) {
								bundledStatuses.forEach(function(saId) {
									var newModifier = {
										id: saId,
										value: modifier.value,
										target: modifier.target
									};
									
									if (modifier.duration > 0) {
										newModifier.duration = modifier.duration;
									}
									if (modifier.turns > 0) {
										newModifier.turns = modifier.turns;
									}
									
									newModifiers.push(newModifier);
								});
							}
							
							attack.modifiers.splice(i, 1);
						}
					}
					
					attack.modifiers = attack.modifiers.concat(newModifiers);
				};
				
				var setActionRemoveModifiers = function(actionFormula, options, attack) {
					if (actionFormula.unsetSa) {
						if (!actionFormula.unsetSa.useStatusAilmentsId) {
							if (actionFormula.unsetSa.bundleArgs != null) {
								for (var i = 0, len = actionFormula.unsetSa.bundleArgs.length; i < len; i += 1) {
									var statusBundleId = Number(options["arg"+actionFormula.unsetSa.bundleArgs[i]]);
									var enumVal = utils.enumNameFromIndex(utils.status_ailment_bundles, Number(statusBundleId));
									var statusBundle = STATUS_BUNDLES[enumVal];
									
									if (statusBundle) {
										for (var j = 0, bundleLen = statusBundle.length; j < bundleLen; j += 1) {
											if (!attack.removeModifiers) {
												attack.removeModifiers = [];
											}
										
											attack.removeModifiers.push({
												id: statusBundle[j],
												target: getTargetById(options.target_range, options.target_method, options.target_segment, options.active_target_method)
											});
										}
									}
									else {
										console.log("No status bundle found for " + actionFormula.unsetSa.bundleArgs[i] + " (" + statusBundleId + ").");
									}
								}
							}
							if (actionFormula.unsetSa.args != null) {
								for (var i = 0, len = actionFormula.unsetSa.args.length; i < len; i += 1) {
									var statusId = Number(options["arg"+actionFormula.unsetSa.args[i]]);
									var enumVal = utils.enumNameFromIndex(ModifierEnum, Number(statusBundleId));
									var statusId = ModifierEnum[enumVal];
									
									if (!attack.removeModifiers) {
										attack.removeModifiers = [];
									}
								
									attack.removeModifiers.push({
										id: statusId,
										target: getTargetById(options.target_range, options.target_method, options.target_segment, options.active_target_method)
									});
								}
							}
						}
						else {
							if (options.status_ailments_id > 0) {
								if (!attack.removeModifiers) {
									attack.removeModifiers = [];
								}
							
								attack.removeModifiers.push({
									id: options.status_ailments_id,
									target: getTargetById(options.target_range, options.target_method, options.target_segment, options.active_target_method)
								});
							}
						}
					}
				};
				
				var getTargetById = function(range, method, segment, activeMethod) {
					return TargetRange[range] + " - " + targetMethod[method] + " - " + targetSegment[segment] + " - " + activeTargetMethod[activeMethod];
				};
			
				function unpacker_filter(source) {
					var trailing_comments = '',
						comment = '',
						unpacked = '',
						found = false;

					// cut trailing comments
					do {
						found = false;
						if (/^\s*\/\*/.test(source)) {
							found = true;
							comment = source.substr(0, source.indexOf('*/') + 2);
							source = source.substr(comment.length).replace(/^\s+/, '');
							trailing_comments += comment + "\n";
